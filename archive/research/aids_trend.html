<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>後天性免疫不全症候群 年間患者数推移</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #e8eaf0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; }
  .card { background: #1a1f2e; border: 1px solid #2a3148; border-radius: 12px; padding: 28px 32px; max-width: 820px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  .title { font-size: 18px; font-weight: 700; color: #e8eaf0; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #8892a4; margin-bottom: 6px; }
  .source { font-size: 11px; color: #5a6480; margin-bottom: 24px; }
  .chart-wrap { position: relative; height: 360px; }
  .stats { display: flex; gap: 24px; margin-top: 20px; flex-wrap: wrap; }
  .stat { background: #232840; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 140px; }
  .stat-label { font-size: 10px; color: #8892a4; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 700; color: #4a9eff; }
  .stat-note { font-size: 10px; color: #5a6480; margin-top: 2px; }
  .down { color: #10b981; }
  .peak { color: #ffd700; }
</style>
</head>
<body>
<div class="card">
  <div class="title">後天性免疫不全症候群（AIDS） 年間報告数推移</div>
  <div class="sub">JIHS 感染症週報（週次報告数の年間集計）</div>
  <div class="source">データ源: 感染症発生動向調査 週報集計 / 2013–2025年</div>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">ピーク年</div>
      <div class="stat-value peak">2013年</div>
      <div class="stat-note">860件</div>
    </div>
    <div class="stat">
      <div class="stat-label">最少年</div>
      <div class="stat-value down">2022年</div>
      <div class="stat-note">436件</div>
    </div>
    <div class="stat">
      <div class="stat-label">2025年</div>
      <div class="stat-value">546件</div>
      <div class="stat-note">前年比 −10.0%</div>
    </div>
    <div class="stat">
      <div class="stat-label">13年間の変化</div>
      <div class="stat-value down">−36.5%</div>
      <div class="stat-note">860 → 546件</div>
    </div>
  </div>
</div>

<script>
const years = [2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025];
const values = [860,853,761,809,808,725,634,503,507,436,550,607,546];

// Trend line (simple linear regression)
const n = years.length;
const xMean = years.reduce((a,b)=>a+b,0)/n;
const yMean = values.reduce((a,b)=>a+b,0)/n;
const slope = years.reduce((s,x,i)=>s+(x-xMean)*(values[i]-yMean),0) /
              years.reduce((s,x)=>s+(x-xMean)**2,0);
const intercept = yMean - slope*xMean;
const trendLine = years.map(x => Math.round(intercept + slope*x));

new Chart(document.getElementById('chart'), {
  data: {
    labels: years.map(String),
    datasets: [
      {
        type: 'line',
        label: '年間報告数',
        data: values,
        borderColor: '#4a9eff',
        backgroundColor: 'rgba(74,158,255,0.12)',
        borderWidth: 2.5,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: values.map((v,i) =>
          v === Math.max(...values) ? '#ffd700' :
          v === Math.min(...values) ? '#10b981' : '#4a9eff'
        ),
        pointBorderColor: '#1a1f2e',
        pointBorderWidth: 2,
        fill: true,
        tension: 0.35,
        order: 1
      },
      {
        type: 'line',
        label: '線形トレンド',
        data: trendLine,
        borderColor: 'rgba(248,113,113,0.6)',
        borderWidth: 1.5,
        borderDash: [5,4],
        pointRadius: 0,
        fill: false,
        order: 2
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 24 }
      },
      tooltip: {
        backgroundColor: '#232840',
        borderColor: '#2a3148',
        borderWidth: 1,
        titleColor: '#e8eaf0',
        bodyColor: '#8892a4',
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString() + '件'
        }
      }
    },
    scales: {
      x: {
        ticks: { color: '#8892a4', font: { size: 11 } },
        grid: { color: 'rgba(255,255,255,0.05)' }
      },
      y: {
        min: 300,
        ticks: {
          color: '#8892a4', font: { size: 11 },
          callback: v => v.toLocaleString()
        },
        grid: { color: 'rgba(255,255,255,0.07)' },
        title: { display: true, text: '年間報告数（件）', color: '#5a6480', font: { size: 10 } }
      }
    }
  }
});
</script>
</body>
</html>
