<!-- ============ INCIDENCE-RATE MAP PATCH ============ -->
<!-- Insert this block INSIDE <div class="wrap"> just BEFORE the closing of
     the main area, after the existing disease-list-grid. -->

<div class="section-title" style="margin-top:30px">📍 都道府県別 発病率マップ（年度別）</div>
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:10px">
    <div>
      <div class="card-title" id="inc-title">都道府県別発病率 — 結核</div>
      <div class="card-sub" id="inc-sub">2024年 年間累計 / 人口10万人あたり</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px">
      <button onclick="incZoom(1.5)" style="width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">+</button>
      <button onclick="incZoom(0.67)" style="width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">−</button>
      <button onclick="incReset()" style="width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">↺</button>
    </div>
  </div>

  <div style="display:flex;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">疾患</label>
      <select id="incDisease" onchange="renderIncidence()"
        style="padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;min-width:200px"></select>
    </div>
    <div style="flex:1;min-width:280px">
      <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">年度: <span id="incYearLabel">2024年</span></label>
      <input type="range" class="range-slider" id="incYear" min="2013" max="2024" value="2024" step="1" oninput="renderIncidence()">
    </div>
  </div>

  <div id="inc-map" style="overflow:hidden;border-radius:6px;background:var(--bg3)"></div>
  <div class="legend-bar" style="margin-top:8px">
    <span>0</span>
    <div class="legend-gradient"></div>
    <span id="incLegendMax">—</span>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:8px;flex-wrap:wrap">
    <div style="font-size:10px;color:var(--text2)">
      人口源: 2013-2019手動表（総務省）, 2021-2024 人口推計, 2015/2020線形補間 | 単位: /100,000人
    </div>
    <button id="incScaleToggleBtn" onclick="toggleIncScaleMode()"
      style="font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:rgba(220,38,38,.15);color:#f87171;cursor:pointer">
      全年最大値
    </button>
  </div>
</div>

<script>
// ============ INCIDENCE-RATE MAP LOGIC ============
// Depends on: DATA.annual_incidence (disease -> year -> pref -> {cases, pop_k, rate_100k})
//             d3, existing Japan GeoJSON used by the primary map

let incScaleMode = 'global'; // 'global' = all-year max, 'local' = current-year max
let incSvgObj = null;
let incZoomBehavior = null;

function initIncidenceMap() {
  if (!window.DATA || !DATA.annual_incidence) {
    document.getElementById('inc-map').innerHTML =
      '<div style="padding:40px;text-align:center;color:var(--text2);font-size:11px">' +
      'annual_incidence データが見つかりません。full_dashboard_data.json を再生成してください。</div>';
    return;
  }
  // Populate disease dropdown
  const sel = document.getElementById('incDisease');
  const diseases = Object.keys(DATA.annual_incidence).sort(function(a, b) {
    // Sort by recent-year total descending
    const ya = DATA.annual_incidence[a][2024] || {};
    const yb = DATA.annual_incidence[b][2024] || {};
    const ta = (ya['全国'] && ya['全国'].cases) || (ya['総数'] && ya['総数'].cases) || 0;
    const tb = (yb['全国'] && yb['全国'].cases) || (yb['総数'] && yb['総数'].cases) || 0;
    return tb - ta;
  });
  sel.innerHTML = diseases.map(d => `<option value="${d}">${d}</option>`).join('');
  if (diseases.indexOf('結核') >= 0) sel.value = '結核';

  // The existing dashboard defines `const GEOJSON = {features: [...]}` globally.
  // We reuse it here; if it's not ready yet, retry shortly.
  if (typeof GEOJSON === 'undefined' || !GEOJSON.features) {
    setTimeout(initIncidenceMap, 500);
    return;
  }
  buildIncidenceSVG();
  renderIncidence();
}

function buildIncidenceSVG() {
  const container = document.getElementById('inc-map');
  container.innerHTML = '';
  const rect = container.getBoundingClientRect();
  const w = Math.max(rect.width, 300), h = Math.round(w * 0.75);
  const svg = d3.select('#inc-map').append('svg')
    .attr('viewBox', '0 0 ' + w + ' ' + h)
    .attr('width', '100%').attr('height', 'auto');
  const g = svg.append('g');

  const projection = d3.geoMercator()
    .center([137, 36]).scale(w * 1.8).translate([w/2 + 10, h/2 + 30]);
  const path = d3.geoPath().projection(projection);

  g.selectAll('path').data(GEOJSON.features).enter()
    .append('path').attr('class', 'inc-pref-path')
    .attr('d', path).attr('fill', '#2e3347').attr('stroke', '#1a1f2e').attr('stroke-width', 0.5)
    .on('mouseenter', function(ev, d) {
      const name = d.properties.name;
      const disease = document.getElementById('incDisease').value;
      const year = +document.getElementById('incYear').value;
      const e = (DATA.annual_incidence[disease]||{})[year] && DATA.annual_incidence[disease][year][name];
      const rate = e ? e.rate_100k : '—';
      const cases = e ? e.cases.toLocaleString() : '—';
      const popK = e && e.pop_k ? e.pop_k.toLocaleString()+'千人' : '—';
      const tip = document.getElementById('mapTooltip');
      tip.innerHTML = `<b>${name}</b><br>${year}年 ${disease}<br>件数: ${cases}<br>人口: ${popK}<br><b>${rate} / 100k</b>`;
      tip.style.display = 'block';
      tip.style.left = (ev.pageX + 12) + 'px';
      tip.style.top = (ev.pageY + 12) + 'px';
    })
    .on('mousemove', function(ev) {
      const tip = document.getElementById('mapTooltip');
      tip.style.left = (ev.pageX + 12) + 'px';
      tip.style.top = (ev.pageY + 12) + 'px';
    })
    .on('mouseleave', function() {
      document.getElementById('mapTooltip').style.display = 'none';
    });

  incZoomBehavior = d3.zoom().scaleExtent([1,8])
    .on('zoom', (ev) => g.attr('transform', ev.transform));
  svg.call(incZoomBehavior);
  incSvgObj = { svg, g };
}

function incZoom(factor) {
  if (!incSvgObj) return;
  incSvgObj.svg.transition().duration(300).call(incZoomBehavior.scaleBy, factor);
}
function incReset() {
  if (!incSvgObj) return;
  incSvgObj.svg.transition().duration(400).call(incZoomBehavior.transform, d3.zoomIdentity);
}

function toggleIncScaleMode() {
  incScaleMode = (incScaleMode === 'global') ? 'local' : 'global';
  document.getElementById('incScaleToggleBtn').textContent =
    incScaleMode === 'global' ? '全年最大値' : '当年最大値';
  renderIncidence();
}

function renderIncidence() {
  if (!incSvgObj || !DATA.annual_incidence) return;
  const disease = document.getElementById('incDisease').value;
  const year = +document.getElementById('incYear').value;
  document.getElementById('incYearLabel').textContent = year + '年';
  document.getElementById('inc-title').textContent = '都道府県別発病率 — ' + disease;
  document.getElementById('inc-sub').textContent =
    year + '年 年間累計 / 人口10万人あたり';

  const y_data = (DATA.annual_incidence[disease] || {})[year] || {};

  // Compute max for legend
  let maxRate = 0;
  if (incScaleMode === 'global') {
    Object.values(DATA.annual_incidence[disease] || {}).forEach(pref_d => {
      Object.entries(pref_d).forEach(([p, e]) => {
        if (p === '全国' || p === '総数') return;
        if (e.rate_100k && e.rate_100k > maxRate) maxRate = e.rate_100k;
      });
    });
  } else {
    Object.entries(y_data).forEach(([p, e]) => {
      if (p === '全国' || p === '総数') return;
      if (e.rate_100k && e.rate_100k > maxRate) maxRate = e.rate_100k;
    });
  }
  if (maxRate <= 0) maxRate = 1;

  document.getElementById('incLegendMax').textContent =
    maxRate.toFixed(maxRate < 10 ? 2 : 1) + '/100k';

  const colorScale = d3.scaleSequential()
    .domain([0, maxRate])
    .interpolator(t => 'rgba(220,38,38,' + (0.10 + t * 0.90) + ')');

  d3.select('#inc-map').selectAll('.inc-pref-path')
    .transition().duration(400)
    .attr('fill', function(d) {
      const name = d.properties.name;
      const e = y_data[name];
      if (!e || e.rate_100k == null) return '#2e3347';
      return colorScale(e.rate_100k);
    });
}

// Initialize once page + primary map are ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => setTimeout(initIncidenceMap, 800));
} else {
  setTimeout(initIncidenceMap, 800);
}
</script>
<!-- ============ END INCIDENCE-RATE MAP PATCH ============ -->
