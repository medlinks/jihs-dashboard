<!DOCTYPE html>

<title>JIHS 感染症サーベイランスダッシュボード</title>
<style>

.box{text-align:center;padding:40px}
.spinner{width:40px;height:40px;border:3px solid #D9D1BE;border-top-color:#C96342;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}

</style>

<div class="box">
<div class="spinner"></div>
<p>ダッシュボードに移動しています...</p>
<p style="font-size:12px;color:#76705F">自動で移動しない場合は <a href="./dashboard.html">こちら</a> をクリック</p>
